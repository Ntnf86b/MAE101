// Hàm hiển thị danh sách câu hỏi ra cây thư mục DOM
function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';

    quizData.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-card-${index}`;

        card.innerHTML = `
            <div class="question-meta">Câu ${index + 1} - [${q.type} | Mức độ: ${q.level}]</div>
            <div class="question-text">${q.question}</div>
            <ul class="options-list" id="options-${index}">
                ${q.options.map((opt, optIdx) => `
                    <li class="option-item" onclick="handleSelectOption(${index}, ${optIdx})">${opt}</li>
                `).join('')}
            </ul>
            <div class="explanation-box" id="explain-${index}">
                <strong>✅ Đáp án đúng:</strong> ${q.options[q.correct]}<br><br>
                <strong>📝 Lời giải chi tiết:</strong> ${q.explanation}
                <div class="tip-box"><strong>🚀 Mẹo thi trắc nghiệm:</strong> ${q.tip}</div>
            </div>
        `;
        container.appendChild(card);
    });

    // Gọi MathJax render lại toán học sau khi thêm mã vào DOM
    if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise();
    }
}

// Lưu trữ các câu hỏi đã chọn phương án
const userHistory = new Set();

// Xử lý sự kiện chọn đáp án
function handleSelectOption(qIdx, selectedIdx) {
    if (userHistory.has(qIdx)) return; // Tránh bấm lại
    userHistory.add(qIdx);

    const optionsUl = document.getElementById(`options-${qIdx}`);
    const items = optionsUl.getElementsByTagName('li');
    const correctIdx = quizData[qIdx].correct;

    // Đổi màu hiển thị trực quan
    if (selectedIdx === correctIdx) {
        items[selectedIdx].classList.add('correct');
    } else {
        items[selectedIdx].classList.add('wrong');
        items[correctIdx].classList.add('correct');
    }

    // Khóa click
    optionsUl.classList.add('disabled');

    // Hiển thị khung lời giải
    document.getElementById(`explain-${qIdx}`).style.display = 'block';

    // Cập nhật thanh tiến trình
    document.getElementById('progress-count').innerText = userHistory.size;
}

// Hàm tải tệp tin HTML nguồn hiện tại về máy tính người dùng
function downloadQuizFile() {
    const entireHtml = document.documentElement.outerHTML;
    const blob = new Blob([entireHtml], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    
    const downloadAnchor = document.createElement('a');
    downloadAnchor.href = url;
    downloadAnchor.download = 'De_thi_trac_nghiem_tuong_tac_G7_Gioi_Han.html';
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    document.body.removeChild(downloadAnchor);
    URL.revokeObjectURL(url);
}

// Chạy ứng dụng khi tải xong trang
window.onload = renderQuiz;
